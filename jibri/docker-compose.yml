services:
  jibri:
    build: .
    container_name: jitsi-jibri
    restart: unless-stopped
    shm_size: '2gb'
    group_add:
      - "63"
    ports:
      - "2222:2222"
    volumes:
      - ${CONFIG}/jibri:/config:Z
      - ./recordings:/tmp/recordings
    devices:
      - /dev/snd:/dev/snd
    environment:
      - XMPP_SERVER=10.120.4.15
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=hidden.meet.jitsi
      - JIBRI_XMPP_USER=jibri
      - JIBRI_XMPP_PASSWORD=j1br1_p4ss_2026
      - JIBRI_RECORDER_USER=recorder
      - JIBRI_RECORDER_PASSWORD=r3c0rd3r_p4ss_2026
      - JIBRI_BREWERY_MUC=jibribrewery
      - JIBRI_RECORDING_DIR=/tmp/recordings
      - JIBRI_FINALIZE_RECORDING_SCRIPT_PATH=/config/finalize.sh
      - DISPLAY=:0
      - RESOLUTION=1920x1080
      - TZ=Asia/Tashkent
    extra_hosts:
      - "meet.jitsi:10.120.4.15"
      - "xmpp.meet.jitsi:10.120.4.15"
      - "meet-track-dev.ipoint.uz:10.120.4.15"
    cap_add:
      - SYS_ADMIN
      - NET_BIND_SERVICE
