server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    client_max_body_size 500M;
    server_name _;

    ssl_certificate /etc/nginx/ssl/app.crt;
    ssl_certificate_key /etc/nginx/ssl/app.key;

    root /usr/share/nginx/html;
    index index.html;

    # Jitsi config files
    location = /config.js {
        proxy_pass http://10.120.4.15:80/config.js;
        proxy_set_header Host $host;
    }
    location = /interface_config.js {
        proxy_pass http://10.120.4.15:80/interface_config.js;
        proxy_set_header Host $host;
    }
    location = /external_api.js {
        proxy_pass http://10.120.4.15:80/external_api.js;
        proxy_set_header Host $host;
    }
    location = /pwa-worker.js {
        proxy_pass http://10.120.4.15:80/pwa-worker.js;
        proxy_set_header Host $host;
    }

    # Jitsi WebSocket
    location /xmpp-websocket {
        proxy_pass http://10.120.4.15:80/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /http-bind {
        proxy_pass http://10.120.4.15:80/http-bind;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Jitsi static assets
    location /libs/ { proxy_pass http://10.120.4.15:80/libs/; proxy_set_header Host $host; }
    location /css/ { proxy_pass http://10.120.4.15:80/css/; proxy_set_header Host $host; }
    location /images/ { proxy_pass http://10.120.4.15:80/images/; proxy_set_header Host $host; }
    location /sounds/ { proxy_pass http://10.120.4.15:80/sounds/; proxy_set_header Host $host; }
    location /static/ { proxy_pass http://10.120.4.15:80/static/; proxy_set_header Host $host; }
    location /lang/ { proxy_pass http://10.120.4.15:80/lang/; proxy_set_header Host $host; }

    # Jitsi rooms
    location /jitsi/ {
        proxy_pass http://10.120.4.15:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR WebSocket
    location /hubs/ {
        proxy_pass http://meettrack-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Recording upload — large files, slow links from Jibri host. Default
    # proxy_read/send_timeout=60s and request buffering caused 24 video
    # uploads to silently fail (audio extract still succeeded so the meeting
    # ended up audio-only). Stream the body straight through and give it
    # 10 minutes to land.
    location = /api/v1/recordings/upload {
        client_max_body_size 2G;
        proxy_pass http://meettrack-api:8080;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://meettrack-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue SPA (catch-all LAST)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
